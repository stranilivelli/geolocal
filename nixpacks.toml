[phases.setup]
nixPkgs = [
  "php84",
  "php84Extensions.pdo",
  "php84Extensions.pdo_mysql",
  "php84Extensions.mbstring",
  "php84Extensions.xml",
  "php84Extensions.tokenizer",
  "php84Extensions.curl",
  "php84Extensions.zip",
  "php84Extensions.fileinfo",
  "php84Extensions.openssl",
  "composer"
]

[phases.install]
cmds = []

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader"
]

[start]
cmd = "php artisan config:cache && php artisan route:cache && php artisan migrate --force && php -S 0.0.0.0:$PORT -t public"